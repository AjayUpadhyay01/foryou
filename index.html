<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To My Feelings</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    transition:0.5s;
}

/* THEMES */

body.dark{
    background:black;
    color:white;
}

body.light{
    background:white;
    color:black;
}

/* TOP BAR */

.topBar{
    position:fixed;
    top:10px;
    right:10px;
    z-index:1000;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.themeBtn{
    padding:10px 16px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    font-size:14px;
}

.darkBtn{
    background:black;
    color:white;
    border:2px solid white;
}

.lightBtn{
    background:white;
    color:black;
    border:2px solid black;
}

.themeBtn:hover{
    transform:scale(1.08);
}

/* HOME SCREEN */

.home{
    min-height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.title{
    font-size:clamp(28px, 6vw, 70px);
    margin-bottom:50px;
    animation:glow 1.5s infinite alternate;
    line-height:1.2;
}

@keyframes glow{

    from{
        opacity:0.7;
        transform:scale(1);
    }

    to{
        opacity:1;
        transform:scale(1.05);
    }
}

/* BUTTONS */

.buttonContainer{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    width:100%;
}

.circleBtn{
    width:clamp(90px, 22vw, 150px);
    height:clamp(90px, 22vw, 150px);
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-size:clamp(14px, 2vw, 22px);
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,255,255,0.4);
    padding:10px;
}

.circleBtn:hover{
    transform:scale(1.1);
}

.sorryBtn{
    background:#ff4d6d;
    color:white;
}

.thankBtn{
    background:#00c853;
    color:white;
}

 .loveBtn{
    background:#7c4dff;
    color:white;
} 

/* FLOATING STOP BUTTON */

.floatingStopBtn{

    position:fixed;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    padding:14px 28px;

    border:none;

    border-radius:40px;

    background:#ff9800;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    z-index:9999;

    display:none;

    box-shadow:0 0 20px rgba(255,152,0,0.7);

    transition:0.3s;
}

.floatingStopBtn:hover{

    transform:translateX(-50%) scale(1.08);
}

/* EFFECT AREA */

#effectArea{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
}

.floatingText{
    position:absolute;
    font-weight:bold;
    animation:floatUp 5s linear forwards;
    user-select:none;
    white-space:nowrap;
}

@keyframes floatUp{

    0%{
        transform:translateY(0px) scale(1);
        opacity:1;
    }

    100%{
        transform:translateY(-250px) scale(1.5);
        opacity:0;
    }
}

/* LOVE MESSAGE */

.loveMessage{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:clamp(32px, 8vw, 80px);
    font-weight:bold;
    z-index:999;
    text-align:center;
    animation:pulse 1s infinite alternate;
    display:none;
    width:90%;
    line-height:1.3;
}

@keyframes pulse{

    from{
        transform:translate(-50%,-50%) scale(1);
    }

    to{
        transform:translate(-50%,-50%) scale(1.1);
    }
}

/* CANVAS */

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* MOBILE */

@media (max-width:480px){

    .buttonContainer{
        gap:18px;
    }

    .themeBtn{
        padding:8px 12px;
        font-size:12px;
    }

    .title{
        margin-bottom:35px;
    }
}

</style>
</head>

<body class="dark">

<!-- THEME BUTTONS -->

<div class="topBar">

    <button class="themeBtn darkBtn" onclick="setDark()">
        Black Theme
    </button>

    <button class="themeBtn lightBtn" onclick="setLight()">
        White Theme
    </button>

</div>

<!-- HOME SCREEN -->

<div class="home">

    <div class="title">
        Welcome To My Feelings 💫
    </div>

    <div class="buttonContainer">

        <button class="circleBtn sorryBtn" onclick="startSorry()">
            Sorry 😭
        </button>

        <button class="circleBtn thankBtn" onclick="startThankYou()">
            Thank You 😊
        </button>

         <button class="circleBtn loveBtn" onclick="showLove()">
            Do You ❤️
        </button> 

    </div>

</div>

<!-- FLOATING STOP BUTTON -->

<button class="floatingStopBtn" id="floatingStopBtn" onclick="stopEffects()">
    Stop 🛑
</button>

<!-- LOVE MESSAGE -->

<div class="loveMessage" id="loveMessage">
    LOVE ME? ❤️🥺
</div>

<!-- EFFECTS -->

<div id="effectArea"></div>

<canvas id="canvas"></canvas>

<script>

//////////////////////////////////////////////////
// ELEMENTS
//////////////////////////////////////////////////

const homeScreen =
    document.querySelector(".home");

const loveMessage =
    document.getElementById("loveMessage");

const effectArea =
    document.getElementById("effectArea");

const floatingStopBtn =
    document.getElementById("floatingStopBtn");

//////////////////////////////////////////////////
// THEME SWITCH
//////////////////////////////////////////////////

function setDark(){

    document.body.classList.remove("light");

    document.body.classList.add("dark");
}

function setLight(){

    document.body.classList.remove("dark");

    document.body.classList.add("light");
}

//////////////////////////////////////////////////
// FLOATING TEXT
//////////////////////////////////////////////////

function createFloating(text, emoji){

    const div = document.createElement("div");

    div.className = "floatingText";

    div.innerText = text + " " + emoji;

    div.style.left =
        Math.random() * window.innerWidth + "px";

    div.style.top =
        Math.random() * window.innerHeight + "px";

    div.style.fontSize =
        (15 + Math.random()*40) + "px";

    const colors = [
        "#ff1744",
        "#00e676",
        "#2979ff",
        "#ffea00",
        "#d500f9",
        "#ffffff"
    ];

    div.style.color =
        colors[Math.floor(Math.random()*colors.length)];

    effectArea.appendChild(div);

    setTimeout(()=>{
        div.remove();
    },5000);
}

//////////////////////////////////////////////////
// ACTIVE INTERVAL
//////////////////////////////////////////////////

let activeInterval = null;

//////////////////////////////////////////////////
// SORRY MODE
//////////////////////////////////////////////////

function startSorry(){

    resetEverything();

    homeScreen.style.display = "none";

    floatingStopBtn.style.display = "block";

    activeInterval = setInterval(()=>{

        createFloating("SORRY","😭");

    },40);

    createExplosionBurst();
}

//////////////////////////////////////////////////
// THANK YOU MODE
//////////////////////////////////////////////////

function startThankYou(){

    resetEverything();

    homeScreen.style.display = "none";

    floatingStopBtn.style.display = "block";

    activeInterval = setInterval(()=>{

        createFloating("THANK YOU","😊");

    },40);

    createExplosionBurst();
}

//////////////////////////////////////////////////
// LOVE MODE
//////////////////////////////////////////////////

function showLove(){

    resetEverything();

    homeScreen.style.display = "none";

    floatingStopBtn.style.display = "block";

    loveMessage.style.display = "block";

    activeInterval = setInterval(()=>{

        createFloating("LOVE ME","❤️");

    },60);

    createExplosionBurst();
}

//////////////////////////////////////////////////
// STOP EVERYTHING
//////////////////////////////////////////////////

function stopEffects(){

    resetEverything();

    homeScreen.style.display = "flex";

    floatingStopBtn.style.display = "none";
}

//////////////////////////////////////////////////
// RESET
//////////////////////////////////////////////////

function resetEverything(){

    clearInterval(activeInterval);

    particles = [];

    effectArea.innerHTML = "";

    loveMessage.style.display = "none";
}

//////////////////////////////////////////////////
// FIREWORKS
//////////////////////////////////////////////////

const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

canvas.width = window.innerWidth;

canvas.height = window.innerHeight;

let particles = [];

class Particle{

    constructor(x,y,color){

        this.x = x;

        this.y = y;

        this.size =
            Math.random()*4 + 1;

        this.speedX =
            (Math.random()-0.5)*10;

        this.speedY =
            (Math.random()-0.5)*10;

        this.color = color;

        this.life = 100;
    }

    update(){

        this.x += this.speedX;

        this.y += this.speedY;

        this.life--;
    }

    draw(){

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle = this.color;

        ctx.fill();
    }
}

//////////////////////////////////////////////////
// CREATE EXPLOSION
//////////////////////////////////////////////////

function createExplosion(){

    const x =
        Math.random() * canvas.width;

    const y =
        Math.random() * canvas.height;

    const colors = [
        "#ff1744",
        "#00e676",
        "#2979ff",
        "#ffea00",
        "#d500f9",
        "#ffffff"
    ];

    for(let i=0;i<80;i++){

        particles.push(

            new Particle(
                x,
                y,
                colors[
                    Math.floor(
                        Math.random()*colors.length
                    )
                ]
            )
        );
    }
}

//////////////////////////////////////////////////
// MULTIPLE FIREWORK BURSTS
//////////////////////////////////////////////////

function createExplosionBurst(){

    for(let i=0;i<15;i++){

        setTimeout(()=>{

            createExplosion();

        },i*200);
    }
}

//////////////////////////////////////////////////
// ANIMATION LOOP
//////////////////////////////////////////////////

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=0;i<particles.length;i++){

        particles[i].update();

        particles[i].draw();

        if(particles[i].life <= 0){

            particles.splice(i,1);

            i--;
        }
    }

    requestAnimationFrame(animate);
}

animate();

//////////////////////////////////////////////////
// RESPONSIVE CANVAS
//////////////////////////////////////////////////

window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;

    canvas.height = window.innerHeight;
});

</script>

</body>
</html>
